<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cân Nông Sản</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{

    font-family:Arial,sans-serif;

    margin:15px;

    background:#f5f5f5;

}

h2{

    text-align:center;

}

#capture{

    background:#f5f5f5;

}

.topbar{

    background:white;

    padding:15px;

    border-radius:10px;

    margin-bottom:15px;

    box-shadow:0 0 5px rgba(0,0,0,.1);

}

.topbar select{

    padding:8px;

    font-size:16px;

}

#columns{

    display:flex;

    gap:10px;

    overflow-x:auto;

    padding-bottom:10px;

}

.column{

    background:white;

    padding:10px;

    border-radius:10px;

    min-width:110px;

    box-shadow:0 0 5px rgba(0,0,0,.1);

}

.column h3{

    margin:0 0 10px;

    text-align:center;

}

.column input{

    width:100%;

    box-sizing:border-box;

    margin-bottom:5px;

    padding:8px;

    font-size:16px;

    text-align:center;

}

.col-total{

    text-align:center;

    font-weight:bold;

    color:green;

    margin-top:5px;

}

.summary{

    background:white;

    padding:15px;

    border-radius:10px;

    margin-top:15px;

    box-shadow:0 0 5px rgba(0,0,0,.1);

}

.summary label{

    display:block;

    margin-top:10px;

}

.summary input{

    width:100%;

    padding:10px;

    font-size:18px;

    box-sizing:border-box;

}

.total{

    font-size:24px;

    font-weight:bold;

    color:#0056d6;

}

.money{

    font-size:34px;

    font-weight:bold;

    color:red;

    margin-top:10px;

}

.btn{

    width:100%;

    padding:12px;

    font-size:18px;

    margin-top:15px;

    border:none;

    border-radius:8px;

    cursor:pointer;

}

.btn-download{

    background:#28a745;

    color:white;

}

.btn-reset{

    background:#dc3545;

    color:white;

}

</style>

</head>

<body>

<div id="capture">

<h2>📦 CÂN NÔNG SẢN</h2>

<div class="topbar">

    <label>Đơn vị nhập liệu</label>

    <select id="unit">

        <option value="kg">Kg</option>

        <option value="g">Gam</option>

    </select>

</div>

<div id="columns"></div>

<div class="summary">

    <div>

        Tổng khối lượng:

        <div class="total">

            <span id="grandTotal">0.000</span> kg

        </div>

    </div>

    <label>Trừ bì (gam)</label>

    <input type="number" id="tare" value="0">

    <div style="margin-top:15px;">

        Khối lượng sau trừ bì:

        <div class="total">

            <span id="netWeight">0.000</span> kg

        </div>

    </div>

    <label>Đơn giá (đ/kg)</label>

    <input type="number" id="price" value="0">

    <hr>

    <div>

        Thành tiền:

        <div class="money" id="money">

            0 đ

        </div>

    </div>

</div>

</div>

<button class="btn btn-download" onclick="downloadImage()">

📷 Tải ảnh kết quả

</button>

<button class="btn btn-reset" onclick="resetForm()">

🗑️ Làm mới phiếu cân

</button>

<script>

const columnsDiv = document.getElementById("columns");

function createColumn(){

    const col = document.createElement("div");

    col.className = "column";

    const title = document.createElement("h3");

    title.innerText = "Cột " + (columnsDiv.children.length + 1);

    col.appendChild(title);

    for(let i=0;i<5;i++){

        const input = document.createElement("input");

        input.type = "number";

        input.step = "0.001";

        input.addEventListener("input",()=>{

            updateTotals();

            checkAddColumn();

        });

        col.appendChild(input);

    }

    const total = document.createElement("div");

    total.className = "col-total";

    total.innerText = "0.000 kg";

    col.appendChild(total);

    columnsDiv.appendChild(col);

}

function updateTotals(){

    let grandTotal = 0;

    const unit =

        document.getElementById("unit").value;

    document.querySelectorAll(".column").forEach(col=>{

        let colTotal = 0;

        col.querySelectorAll("input").forEach(input=>{

            let value =

                Number(input.value) || 0;

            if(unit === "g"){

                value = value / 1000;

            }

            colTotal += value;

        });

        col.querySelector(".col-total").innerText =

            colTotal.toFixed(3) + " kg";

        grandTotal += colTotal;

    });

    document.getElementById("grandTotal").innerText =

        grandTotal.toFixed(3);

    const tareGram =

        Number(document.getElementById("tare").value) || 0;

    const tareKg =

        tareGram / 1000;

    const netWeight =

        grandTotal - tareKg;

    document.getElementById("netWeight").innerText =

        netWeight.toFixed(3);

    const price =

        Number(document.getElementById("price").value) || 0;

    const money =

        netWeight * price;

    document.getElementById("money").innerText =

        money.toLocaleString("vi-VN") + " đ";

}

function checkAddColumn(){

    const cols =

        document.querySelectorAll(".column");

    const lastCol =

        cols[cols.length - 1];

    const inputs =

        lastCol.querySelectorAll("input");

    let filled = true;

    inputs.forEach(input=>{

        if(input.value === ""){

            filled = false;

        }

    });

    if(filled){

        createColumn();

    }

}

function downloadImage(){

    html2canvas(

        document.getElementById("capture"),

        {scale:2}

    ).then(canvas=>{

        const link =

            document.createElement("a");

        link.download =

            "can-nong-san.png";

        link.href =

            canvas.toDataURL("image/png");

        link.click();

    });

}

function resetForm(){

    if(confirm("Xóa toàn bộ dữ liệu hiện tại?")){

        columnsDiv.innerHTML = "";

        createColumn();

        document.getElementById("tare").value = 0;

        document.getElementById("price").value = 0;

        updateTotals();

    }

}

document

.getElementById("tare")

.addEventListener("input",updateTotals);

document

.getElementById("price")

.addEventListener("input",updateTotals);

document

.getElementById("unit")

.addEventListener("change",updateTotals);

createColumn();

</script>

</body>

</html>
