<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cân Nông Sản</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body{font-family:Arial,sans-serif;margin:15px;background:#f5f5f5}
.card{background:#fff;padding:12px;border-radius:10px;margin-bottom:12px}
#columns{display:flex;gap:10px;overflow:auto}
.column{min-width:110px;background:#fff;padding:10px;border-radius:10px}
.column input{width:100%;padding:8px;box-sizing:border-box;margin:4px 0}
.col-total{font-weight:bold;color:green;text-align:center}
button{padding:10px 12px;border:none;border-radius:8px}
.big{font-size:28px;font-weight:bold;color:red}
</style>
</head>
<body>
<div id="capture">
<h2>📦 Cân Nông Sản</h2>

<div class="card">
<label>Đơn vị:</label>
<select id="unit"><option value="kg">Kg</option><option value="g">Gam</option></select>
</div>

<div id="columns"></div>

<div class="card">
<p>Tổng khối lượng: <b><span id="grandTotal">0.000</span> kg</b></p>
<p>Trừ bì (gam): <input type="number" id="tare" value="0"></p>
<p>Khối lượng sau trừ bì: <b><span id="netWeight">0.000</span> kg</b></p>
<p>Đơn giá (đ/kg): <input type="number" id="price" value="0"></p>
<p>Thành tiền:</p>
<div class="big" id="money">0 đ</div>
</div>
</div>

<button onclick="downloadImage()">📷 Tải ảnh</button>

<script>
const columnsDiv=document.getElementById('columns');

function createColumn(){
 const col=document.createElement('div');
 col.className='column';
 col.innerHTML='<h4>Cột '+(columnsDiv.children.length+1)+'</h4>';
 for(let i=0;i<5;i++){
   const inp=document.createElement('input');
   inp.type='number';
   inp.step='0.001';
   inp.oninput=()=>{updateTotals();checkAddColumn();saveData();};
   col.appendChild(inp);
 }
 const total=document.createElement('div');
 total.className='col-total';
 total.textContent='0.000 kg';
 col.appendChild(total);
 columnsDiv.appendChild(col);
}

function updateTotals(){
 let grand=0;
 const unit=document.getElementById('unit').value;

 document.querySelectorAll('.column').forEach(col=>{
   let ct=0;
   col.querySelectorAll('input').forEach(i=>{
     let v=Number(i.value)||0;
     if(unit==='g') v/=1000;
     ct+=v;
   });
   col.querySelector('.col-total').textContent=ct.toFixed(3)+' kg';
   grand+=ct;
 });

 document.getElementById('grandTotal').textContent=grand.toFixed(3);

 const tare=(Number(document.getElementById('tare').value)||0)/1000;
 const net=grand-tare;
 document.getElementById('netWeight').textContent=net.toFixed(3);

 const price=Number(document.getElementById('price').value)||0;
 document.getElementById('money').textContent=(net*price).toLocaleString('vi-VN')+' đ';
}

function checkAddColumn(){
 const last=document.querySelector('.column:last-child');
 if(!last) return;
 const inputs=last.querySelectorAll('input');
 let ok=true;
 inputs.forEach(i=>{if(i.value==='') ok=false;});
 if(ok) createColumn();
}

function saveData(){
 localStorage.setItem('can_nong_san',document.body.innerHTML);
}

function downloadImage(){
 html2canvas(document.getElementById('capture'),{scale:2}).then(canvas=>{
   const a=document.createElement('a');
   a.href=canvas.toDataURL('image/png');
   a.download='can-nong-san.png';
   a.click();
 });
}

document.getElementById('tare').oninput=updateTotals;
document.getElementById('price').oninput=updateTotals;
document.getElementById('unit').onchange=updateTotals;

createColumn();
</script>
</body>
</html>
