<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cân Nông Sản</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body{font-family:Arial;background:#f5f5f5;margin:10px}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px}
#columns{display:flex;gap:10px;overflow:auto}
.column{background:#fff;padding:10px;border-radius:10px;min-width:130px}
.column input{width:100%;padding:10px;margin:4px 0;font-size:20px;box-sizing:border-box}.coltotal{margin-top:8px;font-size:28px;font-weight:bold;text-align:center}
.big{font-size:34px;font-weight:bold;color:#0056d6}
.money{font-size:42px;font-weight:bold;color:red}
.tare{background:#fff3cd;font-size:28px;font-weight:bold}
.price{background:#d1ecf1;font-size:28px;font-weight:bold}
.saved{background:#fff;border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:8px}
button{padding:10px;border:none;border-radius:8px;margin:4px}
</style>
</head>
<body>
<div id="capture" class="card">
<h2>📦 Cân Nông Sản</h2>
<select id="unit"><option value="kg">Kg</option><option value="g">Gam</option></select>
<div id="columns"></div>
<p>Tổng: <span id="grand">0.000</span> kg</p>
<p>Trừ bì (gam)</p>
<input id="tare" class="tare" type="number" inputmode="numeric" placeholder="Nhập bì">
<p>Sau trừ bì: <span id="net">0.000</span> kg</p>
<p>Đơn giá</p>
<input id="price" class="price" type="number" inputmode="numeric" placeholder="Nhập đơn giá">
<div class="money" id="money">0 đ</div>
</div>

<div class="card">
<button onclick="saveTicket()">💾 Lưu phiếu</button>
<button onclick="downloadCurrent()">📷 Xuất ảnh</button>
<button onclick="exportJSON()">💾 Xuất JSON</button>
<button onclick="clearAllTickets()">🗑️ Xóa toàn bộ phiếu đã lưu</button>
<button onclick="document.getElementById('importFile').click()">📂 Nhập JSON</button>
<input id="importFile" type="file" accept=".json" style="display:none" onchange="importJSON(event)">
</div>

<div class="card">
<h3>📚 Phiếu đã lưu</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>🗑️ Thùng rác</h3>
<button onclick="emptyTrash()">🔥 Xóa vĩnh viễn Thùng rác</button>
<div id="trashHistory"></div>
</div>

<script>
const columns=document.getElementById('columns');

function createColumn(){
 let c=document.createElement('div');
 c.className='column';
 c.innerHTML='<h4>Cột '+(columns.children.length+1)+'</h4>';
 for(let i=0;i<5;i++){
  let inp=document.createElement('input');
  inp.type='number'; inp.inputMode='decimal';
  inp.oninput=()=>{update();autoAdd();};
  c.appendChild(inp);
 }
 let totalDiv=document.createElement('div');
 totalDiv.className='coltotal';
 totalDiv.textContent='TỔNG: 0.000';
 c.appendChild(totalDiv);
 columns.appendChild(c);
}
function autoAdd(){
 let last=document.querySelector('.column:last-child');
 let ok=true;
 last.querySelectorAll('input').forEach(i=>{if(i.value==='') ok=false});
 if(ok) createColumn();
}
function update(){
 let total=0;
 document.querySelectorAll('.column').forEach(col=>{
  let colTotal=0;
  col.querySelectorAll('input').forEach(i=>{
   let v=parseFloat(i.value)||0;
   if(document.getElementById('unit').value==='g') v/=1000;
   total+=v;
   colTotal+=v;
  });
  const t=col.querySelector('.coltotal');
  if(t) t.textContent='TỔNG: '+colTotal.toFixed(3);
 });
 grand.textContent=total.toFixed(3);
 let netv=total-((parseFloat(tare.value)||0)/1000);
 net.textContent=netv.toFixed(3);
 money.textContent=(netv*(parseFloat(price.value)||0)).toLocaleString('vi-VN')+' đ';
}
function getData(){
 let cols=[];
 document.querySelectorAll('.column').forEach(c=>{
  let a=[]; c.querySelectorAll('input').forEach(i=>{if(i.value)a.push(i.value)});
  if(a.length) cols.push(a);
 });
 return {date:new Date().toLocaleString(),columns:cols,total:grand.textContent,net:net.textContent,tare:tare.value||0,price:price.value||0,money:money.textContent};
}
function saveTicket(){
 let t=JSON.parse(localStorage.getItem('tickets')||'[]');
 t.unshift(getData());
 localStorage.setItem('tickets',JSON.stringify(t));
 renderHistory();
 document.getElementById('history').scrollIntoView({behavior:'smooth'});
}
function renderHistory(){
 let arr=JSON.parse(localStorage.getItem('tickets')||'[]');
 const historyEl=document.getElementById('history');
 historyEl.innerHTML='';
 arr.forEach((t,i)=>{
  let d=document.createElement('div');
  d.className='saved'; d.id='saved'+i;
  let h='<b>'+t.date+'</b><br>';
  t.columns.forEach((c,n)=>{h+='<b>Cột '+(n+1)+'</b><br>'+c.join('<br>')+'<br><br>'});
  h+='<hr><b>Tổng:</b> '+t.total+' kg<br><b>Trừ bì:</b> '+t.tare+' g<br><b>Sau trừ bì:</b> '+t.net+' kg<br><b>Đơn giá:</b> '+Number(t.price).toLocaleString('vi-VN')+' đ<br><div class="money">'+t.money+'</div>';
  h+='<button onclick="downloadSaved('+i+')">📷 Tải ảnh</button> ';
  h+='<button onclick="moveToTrash('+i+')">🗑️ Chuyển vào Thùng rác</button>';
  d.innerHTML=h; historyEl.appendChild(d);
 });
}
function downloadCurrent(){
 html2canvas(capture,{scale:4}).then(c=>{let a=document.createElement('a');a.href=c.toDataURL();a.download='phieu.png';a.click();});
}
function downloadSaved(i){
 html2canvas(document.getElementById('saved'+i),{scale:4}).then(c=>{let a=document.createElement('a');a.href=c.toDataURL();a.download='phieu-luu.png';a.click();});
}

const ADMIN_PASSWORD='944151';

function moveToTrash(i){
 const ans=(prompt('Xóa phiếu thường → nhập "Xác Nhận"','')||'').trim();
 if(ans!=='Xác Nhận') return;
 let tickets=JSON.parse(localStorage.getItem('tickets')||'[]');
 let trash=JSON.parse(localStorage.getItem('trashTickets')||'[]');
 trash.unshift(tickets[i]);
 tickets.splice(i,1);
 localStorage.setItem('tickets',JSON.stringify(tickets));
 localStorage.setItem('trashTickets',JSON.stringify(trash));
 renderHistory();
 renderTrash();
}

function clearAllTickets(){
 const pass=(prompt('Nhập mật khẩu quản trị để xóa toàn bộ phiếu','')||'').trim();
 if(pass!==ADMIN_PASSWORD){ alert('Sai mật khẩu'); return; }
 let tickets=JSON.parse(localStorage.getItem('tickets')||'[]');
 let trash=JSON.parse(localStorage.getItem('trashTickets')||'[]');
 trash=[...tickets,...trash];
 localStorage.setItem('trashTickets',JSON.stringify(trash));
 localStorage.removeItem('tickets');
 renderHistory();
 renderTrash();
 alert('Đã chuyển toàn bộ phiếu vào thùng rác');
}

function emptyTrash(){
 const pass=(prompt('Nhập mật khẩu quản trị','')||'').trim();
 if(pass!==ADMIN_PASSWORD){ alert('Sai mật khẩu'); return; }
 const confirmText=(prompt('Nhập Xác Nhận để xóa vĩnh viễn Thùng rác','')||'').trim();
 if(confirmText!=='Xác Nhận') return;
 localStorage.removeItem('trashTickets');
 renderTrash();
 alert('Đã xóa vĩnh viễn thùng rác');
}

function renderTrash(){
 let trash=JSON.parse(localStorage.getItem('trashTickets')||'[]');
 let el=document.getElementById('trashHistory');
 if(!el) return;
 el.innerHTML='';
 trash.forEach((t,i)=>{
   let d=document.createElement('div');
   d.className='saved';
   d.innerHTML='<b>'+t.date+'</b><br><b>Tổng:</b> '+t.total+' kg <br><div class="money">'+t.money+'</div>';
   el.appendChild(d);
 });
}

function exportJSON(){
 const data=localStorage.getItem('tickets')||'[]';
 const blob=new Blob([data],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='phieu-can-backup.json';
 a.click();
}
function importJSON(e){
 const f=e.target.files[0]; if(!f) return;
 const r=new FileReader();
 r.onload=x=>{
  const data=JSON.parse(x.target.result);
  localStorage.setItem('tickets',JSON.stringify(data));
  renderHistory();
  alert('Khôi phục thành công');
 };
 r.readAsText(f);
}
unit.onchange=update; tare.oninput=update; price.oninput=update;
createColumn(); update(); renderHistory(); renderTrash();
</script>
</body>
</html>
