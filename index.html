<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cân Nông Sản</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:10px}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px}
#columns{display:flex;gap:10px;overflow:auto}
.column{background:#fff;padding:10px;border-radius:10px;min-width:130px}
.column input{width:100%;padding:10px;margin:4px 0;font-size:20px;box-sizing:border-box}
.total{font-weight:bold;color:green}
.big{font-size:36px;font-weight:bold;color:#0056d6}
.money{font-size:42px;font-weight:bold;color:red}
.tare{background:#fff3cd;font-size:28px;font-weight:bold}
.price{background:#d1ecf1;font-size:28px;font-weight:bold}
button{padding:10px;border:none;border-radius:8px;margin:4px}
.saved{background:#fff;border:1px solid #ddd;padding:10px;margin-top:10px;border-radius:8px}
</style>
</head>
<body>

<div id="capture">
<div class="card">
<h2>📦 CÂN NÔNG SẢN</h2>
<select id="unit">
<option value="kg">Kg</option>
<option value="g">Gam</option>
</select>
<span id="time"></span>
</div>

<div id="columns"></div>

<div class="card">
<p>Tổng khối lượng</p>
<div class="big"><span id="grand">0.000</span> kg</div>

<p>Trừ bì (gam)</p>
<input class="tare" id="tare" type="number" inputmode="numeric" value="0">

<p>Khối lượng sau trừ bì</p>
<div class="big"><span id="net">0.000</span> kg</div>

<p>Đơn giá (đ/kg)</p>
<input class="price" id="price" type="number" inputmode="numeric" value="0">

<p>Thành tiền</p>
<div class="money" id="money">0 đ</div>
</div>
</div>

<div class="card">
<button onclick="saveTicket()">💾 Lưu phiếu</button>
<button onclick="downloadCurrent()">📷 Xuất ảnh hiện tại</button>
</div>

<div class="card">
<h3>📚 Phiếu đã lưu</h3>
<div id="history"></div>
</div>

<script>
function createColumn(){
 let c=document.createElement('div');
 c.className='column';
 c.innerHTML='<h4>Cột '+(document.querySelectorAll(".column").length+1)+'</h4>';

 for(let i=0;i<5;i++){
   let inp=document.createElement('input');
   inp.type='number';
   inp.step='0.001';
   inp.inputMode='decimal';
   inp.oninput=()=>{update();autoAdd();};
   c.appendChild(inp);
 }

 let t=document.createElement('div');
 t.className='total';
 t.innerText='0.000 kg';
 c.appendChild(t);

 columns.appendChild(c);
}

function autoAdd(){
 let last=document.querySelector('.column:last-child');
 let ok=true;

 last.querySelectorAll('input').forEach(i=>{
   if(i.value==='') ok=false;
 });

 if(ok) createColumn();
}

function update(){
 let grand=0;
 let unit=unitEl.value;

 document.querySelectorAll('.column').forEach(col=>{
   let ct=0;

   col.querySelectorAll('input').forEach(i=>{
      let v=parseFloat(i.value)||0;
      if(unit==='g') v/=1000;
      ct+=v;
   });

   col.querySelector('.total').innerText=ct.toFixed(3)+' kg';
   grand+=ct;
 });

 grandEl.innerText=grand.toFixed(3);

 let net=grand-((parseFloat(tare.value)||0)/1000);
 netEl.innerText=net.toFixed(3);

 let money=net*(parseFloat(price.value)||0);
 moneyEl.innerText=money.toLocaleString('vi-VN')+' đ';
}

function getTicketData(){
 const cols=[];

 document.querySelectorAll('.column').forEach(col=>{
   let arr=[];

   col.querySelectorAll('input').forEach(i=>{
      if(i.value!=='') arr.push(i.value);
   });

   if(arr.length) cols.push(arr);
 });

 return {
   date:new Date().toLocaleString(),
   unit:unitEl.value,
   columns:cols,
   tare:tare.value,
   price:price.value,
   total:grandEl.innerText,
   net:netEl.innerText,
   money:moneyEl.innerText
 };
}

function saveTicket(){
 let tickets=JSON.parse(localStorage.getItem('tickets')||'[]');
 tickets.unshift(getTicketData());
 localStorage.setItem('tickets',JSON.stringify(tickets));
 renderHistory();
 alert('Đã lưu phiếu');
}

function renderHistory(){
 let tickets=JSON.parse(localStorage.getItem('tickets')||'[]');

 history.innerHTML='';

 tickets.forEach((t,index)=>{

   let html=`
   <div class="saved" id="saved-${index}">
   <b>Phiếu #${tickets.length-index}</b><br>
   ${t.date}<br><br>
   `;

   t.columns.forEach((col,i)=>{
      html+=`<b>Cột ${i+1}</b><br>`;
      col.forEach(v=>{
         html+=v+'<br>';
      });
      html+='<br>';
   });

   html+=`
   Tổng: ${t.total} kg<br>
   Trừ bì: ${t.tare} g<br>
   Sau trừ bì: ${t.net} kg<br>
   Đơn giá: ${Number(t.price).toLocaleString('vi-VN')} đ<br><br>
   <span style="font-size:24px;color:red"><b>${t.money}</b></span><br><br>

   <button onclick="downloadSaved(${index})">📷 Tải ảnh</button>
   <button onclick="deleteSaved(${index})">🗑 Xóa</button>
   </div>
   `;

   history.innerHTML+=html;
 });
}

function downloadSaved(index){
 let box=document.getElementById('saved-'+index);

 html2canvas(box,{scale:4}).then(canvas=>{
   let a=document.createElement('a');
   a.download='phieu-'+(index+1)+'.png';
   a.href=canvas.toDataURL('image/png');
   a.click();
 });
}

function deleteSaved(index){
 let tickets=JSON.parse(localStorage.getItem('tickets')||'[]');

 if(confirm('Xóa phiếu này?')){
   tickets.splice(index,1);
   localStorage.setItem('tickets',JSON.stringify(tickets));
   renderHistory();
 }
}

function downloadCurrent(){
 html2canvas(document.getElementById('capture'),{scale:4}).then(canvas=>{
   let a=document.createElement('a');
   a.download='phieu-hien-tai.png';
   a.href=canvas.toDataURL('image/png');
   a.click();
 });
}

const unitEl=document.getElementById('unit');
const tare=document.getElementById('tare');
const price=document.getElementById('price');
const grandEl=document.getElementById('grand');
const netEl=document.getElementById('net');
const moneyEl=document.getElementById('money');

unitEl.onchange=update;
tare.oninput=update;
price.oninput=update;

document.getElementById('time').innerText=new Date().toLocaleString();

createColumn();
update();
renderHistory();
</script>

</body>
</html>
