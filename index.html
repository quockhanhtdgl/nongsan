<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cân Nông Sản Full</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body{font-family:Arial;background:#f5f5f5;margin:10px}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px}
#columns{display:flex;gap:10px;overflow:auto}
.column{background:#fff;padding:10px;border-radius:10px;min-width:130px}
.column input{width:100%;padding:10px;margin:4px 0;font-size:20px;box-sizing:border-box}
.total{font-weight:bold;color:green}
.big{font-size:34px;font-weight:bold;color:#0056d6}
.money{font-size:42px;font-weight:bold;color:red}
.tare{background:#fff3cd;font-size:28px;font-weight:bold}
.price{background:#d1ecf1;font-size:28px;font-weight:bold}
button{padding:10px 14px;border:none;border-radius:8px;margin:4px}
.saved{background:#fff;border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:8px}
</style>
</head>
<body>

<div id="capture">
<div class="card">
<h2>📦 CÂN NÔNG SẢN</h2>
<select id="unit">
<option value="kg">Kg</option>
<option value="g">Gam</option>
</select>
<span id="time"></span>
</div>

<div id="columns"></div>

<div class="card">
<p>Tổng khối lượng</p>
<div class="big"><span id="grand">0.000</span> kg</div>

<p>Trừ bì (gam)</p>
<input class="tare" id="tare" type="number" inputmode="numeric" placeholder="Nhập bì">

<p>Khối lượng sau trừ bì</p>
<div class="big"><span id="net">0.000</span> kg</div>

<p>Đơn giá (đ/kg)</p>
<input class="price" id="price" type="number" inputmode="numeric" placeholder="Nhập đơn giá">

<p>Thành tiền</p>
<div class="money" id="money">0 đ</div>
</div>
</div>

<div class="card">
<button onclick="saveTicket()">💾 Lưu phiếu</button>
<button onclick="downloadCurrent()">📷 Xuất ảnh hiện tại</button>
</div>

<div class="card">
<h3>📚 Phiếu đã lưu</h3>
<div id="history"></div>
</div>

<script>
const columnsDiv=document.getElementById('columns');

function createColumn(){
 const col=document.createElement('div');
 col.className='column';
 col.innerHTML='<h4>Cột '+(columnsDiv.children.length+1)+'</h4>';
 for(let i=0;i<5;i++){
   const inp=document.createElement('input');
   inp.type='number';
   inp.step='0.001';
   inp.inputMode='decimal';
   inp.oninput=()=>{update();autoAdd();};
   col.appendChild(inp);
 }
 const t=document.createElement('div');
 t.className='total';
 t.innerText='0.000 kg';
 col.appendChild(t);
 columnsDiv.appendChild(col);
}

function autoAdd(){
 const last=document.querySelector('.column:last-child');
 let ok=true;
 last.querySelectorAll('input').forEach(i=>{if(i.value==='') ok=false;});
 if(ok) createColumn();
}

function update(){
 let grand=0;
 const unit=document.getElementById('unit').value;

 document.querySelectorAll('.column').forEach(col=>{
   let ct=0;
   col.querySelectorAll('input').forEach(i=>{
      let v=parseFloat(i.value)||0;
      if(unit==='g') v/=1000;
      ct+=v;
   });
   col.querySelector('.total').innerText=ct.toFixed(3)+' kg';
   grand+=ct;
 });

 document.getElementById('grand').innerText=grand.toFixed(3);

 const tare=(parseFloat(document.getElementById('tare').value)||0)/1000;
 const net=grand-tare;
 document.getElementById('net').innerText=net.toFixed(3);

 const price=parseFloat(document.getElementById('price').value)||0;
 document.getElementById('money').innerText=(net*price).toLocaleString('vi-VN')+' đ';
}

function ticketData(){
 const cols=[];
 document.querySelectorAll('.column').forEach(col=>{
   const arr=[];
   col.querySelectorAll('input').forEach(i=>{
      if(i.value!=='') arr.push(i.value);
   });
   if(arr.length) cols.push(arr);
 });

 return {
   date:new Date().toLocaleString(),
   columns:cols,
   tare:document.getElementById('tare').value||'0',
   total:document.getElementById('grand').innerText,
   net:document.getElementById('net').innerText,
   price:document.getElementById('price').value||'0',
   money:document.getElementById('money').innerText
 };
}

function saveTicket(){
 const tickets=JSON.parse(localStorage.getItem('tickets')||'[]');
 tickets.unshift(ticketData());
 localStorage.setItem('tickets',JSON.stringify(tickets));
 renderHistory();
}

function renderHistory(){
 const tickets=JSON.parse(localStorage.getItem('tickets')||'[]');
 const history=document.getElementById('history');
 history.innerHTML='';

 tickets.forEach((t,i)=>{
   const div=document.createElement('div');
   div.className='saved';
   div.id='ticket-'+i;

   let html='<b>Phiếu #'+(tickets.length-i)+'</b><br>'+t.date+'<br><br>';

   t.columns.forEach((c,n)=>{
      html+='<b>Cột '+(n+1)+'</b><br>';
      c.forEach(v=> html+=v+'<br>');
      html+='<br>';
   });

   html+='Tổng: '+t.total+' kg<br>';
   html+='Trừ bì: '+t.tare+' g<br>';
   html+='Sau trừ bì: '+t.net+' kg<br>';
   html+='Đơn giá: '+Number(t.price).toLocaleString('vi-VN')+' đ<br><br>';
   html+='<div style="font-size:28px;color:red;font-weight:bold">'+t.money+'</div><br>';
   html+='<button onclick="downloadSaved('+i+')">📷 Tải ảnh</button>';
   html+='<button onclick="deleteSaved('+i+')">🗑 Xóa</button>';

   div.innerHTML=html;
   history.appendChild(div);
 });
}

function deleteSaved(i){
 const tickets=JSON.parse(localStorage.getItem('tickets')||'[]');
 tickets.splice(i,1);
 localStorage.setItem('tickets',JSON.stringify(tickets));
 renderHistory();
}

function downloadSaved(i){
 html2canvas(document.getElementById('ticket-'+i),{scale:4}).then(c=>{
   const a=document.createElement('a');
   a.download='phieu-'+(i+1)+'.png';
   a.href=c.toDataURL('image/png');
   a.click();
 });
}

function downloadCurrent(){
 html2canvas(document.getElementById('capture'),{scale:4}).then(c=>{
   const a=document.createElement('a');
   a.download='phieu-hien-tai.png';
   a.href=c.toDataURL('image/png');
   a.click();
 });
}

document.getElementById('unit').onchange=update;
document.getElementById('tare').oninput=update;
document.getElementById('price').oninput=update;

document.getElementById('time').innerText=new Date().toLocaleString();

createColumn();
update();
renderHistory();
</script>
</body>
</html>
