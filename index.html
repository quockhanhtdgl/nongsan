<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cân Nông Sản</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f3f3f3;margin:10px}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px}
#columns{display:flex;gap:10px;overflow:auto}
.column{background:#fff;padding:10px;border-radius:10px;min-width:120px}
.column input{width:100%;padding:8px;margin:3px 0;box-sizing:border-box;font-size:18px}
.total{font-weight:bold;color:green}
.bigkg{font-size:34px;font-weight:bold;color:#0056d6}
.money{font-size:42px;font-weight:bold;color:red}
button{padding:12px;border:none;border-radius:8px;margin:3px;font-size:16px}
</style>
</head>
<body>

<div id="capture">
<div class="card">
<h2>📦 CÂN NÔNG SẢN</h2>

<label>Đơn vị:</label>
<select id="unit">
<option value="kg">Kg</option>
<option value="g">Gam</option>
</select>

<p id="time"></p>
</div>

<div id="columns"></div>

<div class="card">
<p>Tổng khối lượng</p>
<div class="bigkg"><span id="grand">0.000</span> kg</div>

<p>Trừ bì (gam)</p>
<input id="tare" type="number" value="0">

<p>Khối lượng sau trừ bì</p>
<div class="bigkg"><span id="net">0.000</span> kg</div>

<p>Đơn giá (đ/kg)</p>
<input id="price" type="number" value="0">

<p>Thành tiền</p>
<div class="money" id="money">0 đ</div>
</div>
</div>

<div class="card">
<button onclick="downloadPNG()">📷 Xuất ảnh</button>
<button onclick="saveTicket()">💾 Lưu phiếu</button>
<button onclick="newTicket()">🗑 Phiếu mới</button>
</div>

<div class="card">
<h3>Lịch sử phiếu đã lưu</h3>
<div id="history"></div>
</div>

<script>
function createColumn(){
 const col=document.createElement('div');
 col.className='column';
 col.innerHTML='<h4>Cột '+(document.querySelectorAll(".column").length+1)+'</h4>';

 for(let i=0;i<5;i++){
   const inp=document.createElement('input');
   inp.type='number';
   inp.step='0.001';
   inp.oninput=()=>{
      update();
      autoAdd();
      autoSave();
   };
   col.appendChild(inp);
 }

 const total=document.createElement('div');
 total.className='total';
 total.innerText='0.000 kg';
 col.appendChild(total);

 document.getElementById('columns').appendChild(col);
}

function autoAdd(){
 const last=document.querySelector('.column:last-child');
 if(!last) return;

 let ok=true;
 last.querySelectorAll('input').forEach(i=>{
   if(i.value==='') ok=false;
 });

 if(ok) createColumn();
}

function update(){
 let grand=0;
 const unit=document.getElementById('unit').value;

 document.querySelectorAll('.column').forEach(col=>{
   let ct=0;

   col.querySelectorAll('input').forEach(i=>{
      let v=parseFloat(i.value)||0;
      if(unit==='g') v/=1000;
      ct+=v;
   });

   col.querySelector('.total').innerText=ct.toFixed(3)+' kg';
   grand+=ct;
 });

 document.getElementById('grand').innerText=grand.toFixed(3);

 const tare=(parseFloat(document.getElementById('tare').value)||0)/1000;
 const net=grand-tare;

 document.getElementById('net').innerText=net.toFixed(3);

 const price=parseFloat(document.getElementById('price').value)||0;
 document.getElementById('money').innerText=(net*price).toLocaleString('vi-VN')+' đ';
}

function collectData(){
 const bags=[];

 document.querySelectorAll('.column input').forEach(i=>{
   bags.push(i.value||'');
 });

 return {
   bags:bags,
   tare:document.getElementById('tare').value,
   price:document.getElementById('price').value,
   unit:document.getElementById('unit').value
 };
}

function autoSave(){
 localStorage.setItem('currentTicket',JSON.stringify(collectData()));
}

function saveTicket(){
 const tickets=JSON.parse(localStorage.getItem('tickets')||'[]');

 tickets.unshift({
   time:new Date().toLocaleString(),
   kg:document.getElementById('net').innerText,
   money:document.getElementById('money').innerText
 });

 localStorage.setItem('tickets',JSON.stringify(tickets));
 loadHistory();
 alert('Đã lưu phiếu');
}

function loadHistory(){
 const tickets=JSON.parse(localStorage.getItem('tickets')||'[]');

 document.getElementById('history').innerHTML=
   tickets.slice(0,30).map(t=>
   '<div>'+t.time+' | '+t.kg+' kg | '+t.money+'</div>'
   ).join('');
}

function downloadPNG(){
 html2canvas(document.getElementById('capture'),{
   scale:4,
   useCORS:true
 }).then(canvas=>{
   const a=document.createElement('a');
   a.download='phieu-can.png';
   a.href=canvas.toDataURL('image/png');
   a.click();
 });
}

function newTicket(){
 if(prompt('Nhập XOA để xác nhận')==='XOA'){
   localStorage.removeItem('currentTicket');
   location.reload();
 }
}

document.getElementById('tare').oninput=()=>{update();autoSave();};
document.getElementById('price').oninput=()=>{update();autoSave();};
document.getElementById('unit').onchange=()=>{update();autoSave();};

document.getElementById('time').innerText=new Date().toLocaleString();

createColumn();
update();
loadHistory();
</script>

</body>
</html>
